<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <script>
    const calUrl = "https://cal.com/kscholarship/soudan";

    liff.init({ liffId: "2009670871-HWqVIXeE" })
      .then(() => {
        if (!liff.isInClient()) {
          window.location.href = calUrl;
          return;
        }
        return liff.getProfile();
      })
      .then(profile => {
        if (!profile) return;
        window.location.href = calUrl + "?line_user_id=" + profile.userId;
      })
      .catch(() => {
        window.location.href = calUrl;
      });
  </script>
</body>
</html>
